<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project 2 - Advanced Checklist</title>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }

h3 { margin-bottom:6px; }

label { display:block; margin:4px 0; }

button {
 width:100%;
 padding:12px;
 border:none;
 border-radius:8px;
 background:#238636;
 color:#fff;
 font-size:16px;
}

.buy{color:#00ff9f;}
.sell{color:#ff4d4d;}
.warn{color:#ffaa00;}
</style>
</head>

<body>

<div class="container">

<h2>📊 Project 2 - Trading Checklist PRO</h2>

<!-- BUY -->
<div class="card">
<h3>🟢 BUY SETUPS</h3>

<b>Case 1: Strong Trend</b>
<label><input type="checkbox" id="b1_day"> Day Trend ↑</label>
<label><input type="checkbox" id="b1_4h"> 4H Trend ↑</label>

<br>

<b>Case 2: Reversal</b>
<label><input type="checkbox" id="b2_day"> Day Trend ↓</label>
<label><input type="checkbox" id="b2_div"> 4H Bullish Divergence</label>

<br>

<b>Case 3: Momentum Reversal</b>
<label><input type="checkbox" id="b3_day"> Day Trend ↓</label>
<label><input type="checkbox" id="b3_candle"> Previous Day Candle = Green</label>
<label><input type="checkbox" id="b3_cross"> 4H Cross Up</label>

</div>

<!-- SELL -->
<div class="card">
<h3>🔴 SELL SETUPS</h3>

<b>Case 1: Strong Trend</b>
<label><input type="checkbox" id="s1_day"> Day Trend ↓</label>
<label><input type="checkbox" id="s1_4h"> 4H Trend ↓</label>

<br>

<b>Case 2: Reversal</b>
<label><input type="checkbox" id="s2_day"> Day Trend ↑</label>
<label><input type="checkbox" id="s2_div"> 4H Bearish Divergence</label>

<br>

<b>Case 3: Momentum Reversal</b>
<label><input type="checkbox" id="s3_day"> Day Trend ↑</label>
<label><input type="checkbox" id="s3_candle"> Previous Day Candle = Red</label>
<label><input type="checkbox" id="s3_cross"> 4H Cross Down</label>

</div>

<button onclick="analyze()">Analyze</button>

<div class="card">
<h3>📢 SIGNAL</h3>
<div id="result">Waiting...</div>
</div>

<div class="card">
<h3>🧠 Insight</h3>
<div id="insight">-</div>
</div>

</div>

<script>

function analyze(){

// ===== BUY CONDITIONS =====
let buyStrong = b1_day.checked && b1_4h.checked;
let buyReversal = b2_day.checked && b2_div.checked;
let buyMomentum = b3_day.checked && b3_candle.checked && b3_cross.checked;

// ===== SELL CONDITIONS =====
let sellStrong = s1_day.checked && s1_4h.checked;
let sellReversal = s2_day.checked && s2_div.checked;
let sellMomentum = s3_day.checked && s3_candle.checked && s3_cross.checked;

// ===== DECISION ENGINE =====
let signal = "WAIT";
let cls = "";
let confidence = 0;
let type = "";

// BUY PRIORITY
if(buyStrong){
 signal = "🟢 BUY";
 cls = "buy";
 type = "Strong Trend";
 confidence = 90;
}
else if(buyReversal){
 signal = "🟢 BUY";
 cls = "buy";
 type = "Reversal";
 confidence = 70;
}
else if(buyMomentum){
 signal = "🟢 BUY";
 cls = "buy";
 type = "Momentum Shift";
 confidence = 65;
}

// SELL PRIORITY
if(sellStrong){
 signal = "🔴 SELL";
 cls = "sell";
 type = "Strong Trend";
 confidence = 90;
}
else if(sellReversal){
 signal = "🔴 SELL";
 cls = "sell";
 type = "Reversal";
 confidence = 70;
}
else if(sellMomentum){
 signal = "🔴 SELL";
 cls = "sell";
 type = "Momentum Shift";
 confidence = 65;
}

// CONFLICT CHECK
if(
 (buyStrong || buyReversal || buyMomentum) &&
 (sellStrong || sellReversal || sellMomentum)
){
 signal = "⚠️ CONFLICT";
 cls = "warn";
 confidence = 50;
 type = "Opposite signals";
}

// OUTPUT
document.getElementById("result").innerHTML =
`<span class="${cls}">${signal}</span><br>
Type: ${type}<br>
Confidence: ${confidence}%`;

// INSIGHT
let insight = "Wait for setup";

if(confidence >= 85){
 insight = "High probability trade";
}
else if(confidence >= 70){
 insight = "Good setup";
}
else if(confidence > 0){
 insight = "Moderate setup";
}
else{
 insight = "No valid setup";
}

document.getElementById("insight").innerText = insight;

}

</script>

</body>
</html>
